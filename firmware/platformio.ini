; pet-esp firmware — Waveshare ESP32-S3-Touch-AMOLED-1.8
; Framework: ESP-IDF via PlatformIO (architecture §2). Arduino-ESP32 is the
; documented fallback only.
;
; No exact PlatformIO board exists for this Waveshare unit, so we start from
; the generic ESP32-S3 devkit and override flash/PSRAM to match the module
; (16 MB flash, 8 MB octal PSRAM — architecture §1).

[platformio]
default_envs = waveshare-s3-amoled-18

[env:waveshare-s3-amoled-18]
platform = espressif32
framework = espidf
board = esp32-s3-devkitc-1

board_build.mcu = esp32s3
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

build_flags =
    -DBOARD_HAS_PSRAM

; LVGL 9.x is added at build-order step 2 (architecture §10). Pinned here
; for reference; left commented until that step.
; lib_deps =
;     lvgl/lvgl@^9.2.0
